<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#f4e7d2" />
  <title>小小畫家拼圖</title>
  <style>
    :root {
      --bg: #f4e7d2;
      --panel: rgba(255,255,255,.82);
      --ink: #544238;
      --accent: #dc8fa4;
      --accent-dark: #b96d84;
      --shadow: 0 12px 30px rgba(86, 58, 45, .18);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.75), transparent 34%),
        linear-gradient(160deg, #f7ecdb 0%, #ecd8c8 100%);
      overscroll-behavior: none;
      touch-action: none;
    }

    #app {
      width: 100%;
      height: 100dvh;
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
    }

    .topbar, .bottombar {
      width: min(720px, 100%);
      margin: 0 auto;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      min-height: 64px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title-wrap { min-width: 0; }
    h1 { margin: 0; font-size: clamp(18px, 4.5vw, 26px); letter-spacing: .04em; }
    .subtitle { margin-top: 2px; font-size: 12px; opacity: .72; white-space: nowrap; }

    .stats { display: flex; gap: 8px; }
    .stat {
      min-width: 64px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.72);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .stat span { display: block; font-size: 10px; opacity: .65; }
    .stat strong { display: block; font-size: 16px; }

    #game-shell {
      position: relative;
      width: min(720px, 100%);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255,255,255,.3);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.6), var(--shadow);
    }

    #pixi-container { width: 100%; height: 100%; }
    #pixi-container canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    .bottombar {
      min-height: 58px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 8px;
      font: inherit;
      font-weight: 800;
      color: white;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      box-shadow: 0 6px 14px rgba(185,109,132,.28);
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px) scale(.99); }
    button.secondary { color: var(--ink); background: rgba(255,255,255,.9); box-shadow: none; }

    #win-panel {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(64,42,35,.35);
      backdrop-filter: blur(8px);
      z-index: 20;
    }
    #win-panel.show { display: grid; }
    .win-card {
      width: min(360px, 100%);
      padding: 26px 20px;
      border-radius: 24px;
      background: rgba(255,250,245,.96);
      text-align: center;
      box-shadow: 0 20px 50px rgba(57,35,28,.28);
      animation: pop .35s ease-out;
    }
    .win-card .emoji { font-size: 56px; }
    .win-card h2 { margin: 8px 0 6px; font-size: 28px; }
    .win-card p { margin: 0 0 18px; line-height: 1.6; }
    .win-card button { width: 100%; }

    @keyframes pop { from { transform: scale(.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    @media (max-height: 620px) {
      .topbar { min-height: 52px; padding: 7px 10px; }
      .subtitle { display: none; }
      .bottombar { min-height: 50px; padding: 6px; }
      button { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="title-wrap">
        <h1>小小畫家拼圖</h1>
        <div class="subtitle">拖曳拼圖片，靠近正確位置就會自動吸附</div>
      </div>
      <div class="stats">
        <div class="stat"><span>時間</span><strong id="time">00:00</strong></div>
        <div class="stat"><span>移動</span><strong id="moves">0</strong></div>
      </div>
    </header>

    <section id="game-shell">
      <div id="pixi-container"></div>
      <div id="win-panel">
        <div class="win-card">
          <div class="emoji">🎉</div>
          <h2>拼圖完成！</h2>
          <p id="win-text">完成時間 00:00，共移動 0 次。</p>
          <button id="play-again">再玩一次</button>
        </div>
      </div>
    </section>

    <nav class="bottombar">
      <button class="secondary" id="preview-btn">按住看原圖</button>
      <button id="shuffle-btn">重新打亂</button>
      <button class="secondary" id="level-btn">難度：3 × 4</button>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
